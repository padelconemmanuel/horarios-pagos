<!DOCTYPE html>
<html lang="es" translate="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="google" content="notranslate">
<title>Horario Semanal — Padel Con Emmanuel</title>
<meta name="theme-color" content="#060912">
<style>
:root{
  --bg:#060912; --s1:#0b1120; --s2:#101830; --s3:#182241;
  --acc:#00e5a0; --acc2:#00cfff; --t1:#eef2ff; --t2:#8b95b5;
  --rd:#ff3d6b; --am:#ffb648;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;padding:16px 12px 60px}

.wrap{max-width:760px;margin:0 auto}
h1{font-size:clamp(22px,5vw,30px);font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
h1 .grad{background:linear-gradient(120deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--t2);font-size:13px;margin-bottom:18px}

.weeknav{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:12px 14px;margin-bottom:14px}
.weeknav button{background:var(--s2);color:var(--t1);border:1px solid var(--s3);border-radius:10px;padding:8px 12px;font-size:14px;font-weight:700;cursor:pointer}
.weeknav button:active{transform:scale(.96)}
.weekrange{flex:1;text-align:center;font-weight:800;font-size:15px}
.weekrange span{display:block;font-size:11.5px;color:var(--t2);font-weight:500;margin-top:2px}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.sum-card{background:var(--s1);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:12px;text-align:center}
.sum-card b{display:block;font-size:18px;font-weight:900}
.sum-card span{font-size:11px;color:var(--t2)}
.sum-card.ok b{color:var(--acc)}
.sum-card.pend b{color:var(--am)}

.day{background:linear-gradient(160deg,var(--s1),var(--s2));border:1px solid rgba(255,255,255,.07);border-left:4px solid var(--dc,var(--acc));border-radius:18px;margin-bottom:14px;overflow:hidden}
.day-h{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer}
.day-h h2{font-size:15px;font-weight:800;color:var(--dc,var(--t1))}
.day-h .day-tot{font-size:12px;color:var(--t2)}
.day-body{border-top:1px solid rgba(255,255,255,.06)}
.day-body.collapsed{display:none}

.slot{border-bottom:1px solid rgba(255,255,255,.05)}
.slot:last-child{border-bottom:none}
.slot.paid{background:rgba(0,229,160,.05)}

.row{display:flex;align-items:center;gap:8px;padding:10px 14px}
/* Grid compartido: hora | nombre | wa | cancha | precio | metodo | chk | del
   Mismas columnas en head y alumno para que todo quede alineado */
.row.head, .row.alumno{
  display:grid;
  grid-template-columns: 46px 1fr 26px 26px 72px 92px 24px 22px;
  align-items:center; gap:8px; padding:10px 14px;
}
.row.head{padding-bottom:6px}
.row.head.grupal{padding-bottom:2px}
.row.alumno{padding:6px 14px}
.hora{grid-column:1; font-size:12.5px;color:var(--t2);font-weight:700}
.texto{grid-column:2; font-size:13.5px;background:transparent;border:none;color:var(--t1);outline:none;border-bottom:1px dashed transparent;min-width:0;width:100%}
.texto:focus{border-bottom:1px dashed var(--acc2)}
.texto.solo{font-size:13.5px}
.nota{font-size:10.5px;color:var(--am);display:block;margin-top:2px;grid-column:2}
.cancha-badge{grid-column:4; width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;cursor:pointer;user-select:none}
.cancha-badge.C{background:rgba(0,207,255,.15);color:var(--acc2)}
.cancha-badge.D{background:rgba(255,182,72,.15);color:var(--am)}
.cancha-badge.none{background:rgba(255,255,255,.06);color:var(--t2)}
.precio{grid-column:5; width:100%;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--t1);font-size:12.5px;padding:6px 6px;text-align:right;outline:none}
.precio::placeholder{color:var(--t2)}
.metodo{grid-column:6; width:100%;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--t1);font-size:11.5px;padding:6px 4px;outline:none}
.metodo:invalid,.metodo option[value=""]{color:var(--t2)}
.chk{grid-column:7; width:24px;height:24px;border-radius:7px;border:2px solid var(--s3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--acc);font-weight:900}
.chk.on{background:var(--acc);border-color:var(--acc);color:#04120c}
.chk.general{border-color:var(--acc2);color:var(--acc2)}
.chk.general.on{background:var(--acc);border-color:var(--acc);color:#04120c}
.grupal-lbl{grid-column:2; font-size:11px;color:var(--t2);font-weight:700;letter-spacing:.3px}

.btn-del{grid-column:8; width:22px;height:22px;border-radius:7px;border:none;background:transparent;color:var(--t2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-del:hover{color:var(--rd)}
.btn-wa{grid-column:3; width:24px;height:24px;border-radius:7px;background:rgba(0,229,160,.12);text-decoration:none;font-size:12px;display:inline-flex;align-items:center;justify-content:center;margin:0 auto}
.nombre-wrap{grid-column:2; min-width:0; display:flex; flex-direction:column}

.addrow{display:flex;align-items:center;gap:6px;padding:10px 14px;flex-wrap:wrap}
.addrow input,.addrow select{background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--t1);font-size:12px;padding:6px 8px;outline:none}
.addrow input::placeholder{color:var(--t2)}
.addrow .add-hora{width:56px}
.addrow .add-nombre{flex:1;min-width:110px}
.addrow .add-cancha{width:46px}
.addrow .add-precio{width:70px}
.addrow button, .add-clase-row button{background:rgba(0,229,160,.12);color:var(--acc);border:1px solid rgba(0,229,160,.3);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.add-clase-row{padding:12px 14px;border-top:1px solid rgba(255,255,255,.06)}
.add-alumno-row{padding:6px 14px 10px 46px}

.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;font-size:11.5px;color:var(--t2)}
.legend b{color:var(--t1)}

.backupbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.backupbar button{background:var(--s1);color:var(--t1);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.backupbar button:active{transform:scale(.97)}

@media(max-width:420px){
  .row.head, .row.alumno{grid-template-columns: 38px 1fr 22px 22px 58px 74px 22px 20px; gap:5px; padding-left:10px; padding-right:10px}
  .precio{font-size:10.5px; padding:5px 4px}
  .metodo{font-size:10px; padding:5px 2px}
  .texto{font-size:12.5px}
  .hora{font-size:11px}
  .cancha-badge{width:22px;height:22px;font-size:10px}
  .chk{width:22px;height:22px;font-size:12px}
  .btn-del{width:20px;height:20px;font-size:13px}
  .btn-wa{width:22px;height:22px}
  .add-alumno-row{padding-left:10px}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>Horario <span class="grad">Semanal</span></h1>
  <div class="sub">Tildá a cada alumno cuando paga · en clases grupales el "OK" general se prende solo cuando están todos tildados (y también sirve para tildar/destildar a todos de una)</div>

  <div class="legend"><span><b style="color:var(--acc2)">C</b> = cancha cubierta</span><span><b style="color:var(--am)">D</b> = cancha descubierta</span></div>

  <div class="backupbar">
    <button id="btn-drive" onclick="subirBackupDrive()">☁️ Subir a Google Drive</button>
    <button id="btn-drive-import" onclick="importarBackupDrive()">⬇️ Importar desde Google Drive</button>
    <button id="btn-contactos" onclick="importarContactosDrive()">📇 Traer contactos</button>
    <button id="btn-verificar-contactos" onclick="verificarContactosAmbiguos()">⚠️ Verificar contactos</button>
  </div>

  <div class="weeknav">
    <button onclick="cambiarSemana(-1)">◀</button>
    <div class="weekrange" id="weekrange"></div>
    <button onclick="irHoy()">Hoy</button>
    <button onclick="cambiarSemana(1)">▶</button>
  </div>

  <div class="summary">
    <div class="sum-card"><b id="s-total">0</b><span>clases</span></div>
    <div class="sum-card ok"><b id="s-cobrado">$0</b><span>cobrado</span></div>
    <div class="sum-card pend"><b id="s-pendiente">$0</b><span>pendiente</span></div>
  </div>

  <div id="dias"></div>
</div>

<script>
const DIAS = [
  { id:'lun', nombre:'Lunes', clases:[
    {h:'07:00', alumnos:['Sofy','Mariano'], c:'C'},
    {h:'08:00', alumnos:['Alan'], c:'C'},
    {h:'09:00', alumnos:['Noe'], c:'C'},
    {h:'10:00', alumnos:['Reserva'], c:'C'},
    {h:'11:00', alumnos:['Reserva'], c:'C'},
    {h:'12:00', alumnos:['Maxi','Pablo'], c:'C'},
    {h:'13:00', alumnos:['Mariano'], c:'C'},
    {h:'14:00', alumnos:['Erica'], c:'C'},
    {h:'15:00', alumnos:['Fernanda (nueva)'], c:'C'},
    {h:'16:00', alumnos:['Juli','Fernando'], c:'C'},
    {h:'17:00', alumnos:['Feli','Marcos'], c:'C'},
  ]},
  { id:'mar', nombre:'Martes', clases:[
    {h:'08:00', alumnos:['Natalia','Sasa'], c:'C'},
    {h:'09:00', alumnos:['Pablo x4'], c:'C'},
    {h:'10:00', alumnos:['Nahir'], c:'C'},
    {h:'11:00', alumnos:['Ramiro'], c:'C'},
    {h:'12:30', alumnos:['Sebas (clase partido)'], c:'C'},
    {h:'13:30', alumnos:['Reserva'], c:'C'},
    {h:'14:30', alumnos:['Dimitri'], c:'C'},
    {h:'15:30', alumnos:['Mailen'], c:'C'},
    {h:'16:30', alumnos:['Silvina'], c:'C'},
  ]},
  { id:'mie', nombre:'Miércoles', clases:[
    {h:'09:00', alumnos:['Reserva'], c:'C'},
    {h:'10:00', alumnos:['Daniela','Alejandro'], c:'C', p:37000},
    {h:'11:00', alumnos:['Lucas x2'], c:''},
    {h:'12:00', alumnos:['Erica'], c:'C', p:54000},
    {h:'13:00', alumnos:['Cynthia'], c:'C'},
    {h:'14:00', alumnos:['Fernanda','Lula'], c:'C'},
    {h:'15:00', alumnos:['Mailen (clase partido)'], c:'C'},
    {h:'16:00', alumnos:['Nicolas'], c:'C'},
  ]},
  { id:'jue', nombre:'Jueves', clases:[
    {h:'10:30', alumnos:['Reserva'], c:'C'},
    {h:'12:30', alumnos:['Reserva'], c:'C'},
    {h:'13:30', alumnos:['Hernan'], c:'D'},
    {h:'14:30', alumnos:['Dimitri'], c:'D', nota:'D/C — sólo de 14 a 15 afuera'},
    {h:'15:30', alumnos:['Reserva'], c:''},
  ]},
  { id:'vie', nombre:'Viernes', clases:[
    {h:'08:00', alumnos:['Juan','Santi'], c:'C'},
    {h:'09:00', alumnos:['Rodrigo'], c:'C'},
    {h:'10:00', alumnos:['Marcelo'], c:''},
    {h:'11:00', alumnos:['Patricia'], c:'C'},
    {h:'12:00', alumnos:['Reserva'], c:'C'},
    {h:'13:00', alumnos:['Reserva'], c:'C'},
    {h:'14:00', alumnos:['Malen','Nahir'], c:'C'},
    {h:'15:00', alumnos:['Reserva'], c:'C'},
    {h:'16:00', alumnos:['Reserva'], c:'C'},
    {h:'17:00', alumnos:['Nicolas'], c:'C'},
  ]},
  { id:'sab', nombre:'Sábado', clases:[
    {h:'09:00', alumnos:['Sofy','Mariano'], c:'C'},
    {h:'10:00', alumnos:['Marcos','Lisandro','Brian'], c:'D'},
    {h:'11:00', alumnos:['Ana','Andrea','Martu','Xoa'], c:''},
    {h:'12:00', alumnos:['Vicky','Maty'], c:'D'},
    {h:'13:00', alumnos:['Dante','Joaquin Ale'], c:'D'},
    {h:'14:00', alumnos:['Joaquin x2'], c:'D'},
    {h:'15:00', alumnos:['Silvina','Fer','Cyn','Emiliano'], c:''},
    {h:'16:00', alumnos:['Niños Ines'], c:''},
    {h:'17:00', alumnos:['Ariel','Bautista'], c:''},
  ]},
];
DIAS.forEach(d => d.clases.forEach((cl,i) => cl.id = d.id+'-'+i));

const DIA_COLOR = {
  lun: '#00e5a0',
  mar: '#00cfff',
  mie: '#ffb648',
  jue: '#c98fff',
  vie: '#ff5d8f',
  sab: '#4facfe',
};

const LS_TEMPLATE = 'padel_horario_template_v3';
const LS_PAGOS = 'padel_horario_pagos_v3';
const LS_CONTACTOS = 'padel_contactos_v1';
const METODOS = [
  { v:'', l:'Método' },
  { v:'efectivo', l:'Efectivo' },
  { v:'transferencia', l:'Transferencia' },
  { v:'mercadopago', l:'MercadoPago' },
];

function normalizarNombreCompleto(s){
  return s.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/\(.*?\)/g, '')
    .replace(/x\s*\d+/gi, '')
    .replace(/[^a-z ]/g, '')
    .replace(/\s+/g,' ')
    .trim();
}
function normalizarNombre(s){
  return normalizarNombreCompleto(s).split(' ')[0] || '';
}
function normalizarTelAR(tel){
  let t = tel.replace(/[^\d]/g, '');
  if (t.startsWith('549')) return t;
  if (t.startsWith('54'))  return '549' + t.slice(2);
  if (t.startsWith('9'))   return '54' + t;
  if (t.startsWith('0'))   return '549' + t.slice(1);
  return '549' + t;
}
function cargarContactos(){
  const raw = localStorage.getItem(LS_CONTACTOS);
  const data = raw ? JSON.parse(raw) : [];
  return Array.isArray(data) ? data : []; // formato viejo (mapa) queda descartado, hay que "Traer contactos" de nuevo
}
function telDeAlumno(nombre){
  const contactos = cargarContactos();
  const claveCompleta = normalizarNombreCompleto(nombre);

  // 1) Coincidencia exacta por nombre completo (más confiable)
  let c = contactos.find(c => normalizarNombreCompleto(c.nombre) === claveCompleta);
  if (c) return c.tel;

  // 2) El nombre de la clase empieza con el nombre completo del contacto
  //    (ej: clase "Sofi Viernes 7 Am" vs contacto "Sofi")
  const candidatosInicio = contactos.filter(c => {
    const nc = normalizarNombreCompleto(c.nombre);
    return nc && claveCompleta.startsWith(nc + ' ') || claveCompleta === nc;
  });
  if (candidatosInicio.length === 1) return candidatosInicio[0].tel;

  // 3) Fallback: primera palabra, SOLO si hay un único contacto que matchea
  //    (si hay ambigüedad entre varios contactos con el mismo primer nombre, no adivinar)
  const clave1 = normalizarNombre(nombre);
  const candidatos1 = contactos.filter(c => normalizarNombre(c.nombre) === clave1);
  if (candidatos1.length === 1) return candidatos1[0].tel;

  return ''; // ambiguo o sin match — mejor no asociar mal
}
function botonWA(nombre){
  const tel = telDeAlumno(nombre);
  if (!tel) return '';
  return `<a class="btn-wa" href="https://wa.me/${normalizarTelAR(tel)}" target="_blank" rel="noopener" title="Escribir por WhatsApp">💬</a>`;
}
function datalistContactos(){
  const contactos = cargarContactos();
  if (!contactos.length) return '';
  return `<datalist id="dl-contactos">${contactos.map(c => `<option value="${c.nombre.replace(/"/g,'&quot;')}">`).join('')}</datalist>`;
}

function cargarTemplate(){
  const raw = localStorage.getItem(LS_TEMPLATE);
  if (!raw) return;
  const guardado = JSON.parse(raw);
  DIAS.forEach(d => { if (guardado[d.id]) d.clases = guardado[d.id]; });
}
function guardarTemplate(){
  const out = {};
  DIAS.forEach(d => { out[d.id] = d.clases; });
  localStorage.setItem(LS_TEMPLATE, JSON.stringify(out));
}
function parseAlumnos(texto){
  return texto.split(/,| y /i).map(s => s.trim()).filter(Boolean);
}
function normalizarHora(h){
  const partes = h.trim().split(':');
  const hh = (partes[0]||'0').padStart(2,'0');
  const mm = (partes[1]||'00').padStart(2,'0');
  return hh+':'+mm;
}
function nuevoIdClase(dayId){
  return dayId + '-n' + Date.now() + Math.floor(Math.random()*1000);
}
function cargarPagos(){
  const raw = localStorage.getItem(LS_PAGOS);
  return raw ? JSON.parse(raw) : {};
}
function guardarPagos(pagos){ localStorage.setItem(LS_PAGOS, JSON.stringify(pagos)); }
function estaPagado(pagosCl, idx){ return !!(pagosCl[idx] && pagosCl[idx].p); }
function metodoDe(pagosCl, idx){ return (pagosCl[idx] && pagosCl[idx].m) || ''; }
function selectMetodo(weekKey, id, idx, actual){
  const opts = METODOS.map(m => `<option value="${m.v}" ${m.v===actual?'selected':''}>${m.l}</option>`).join('');
  return `<select class="metodo" onchange="setMetodo('${weekKey}','${id}',${idx},this.value)">${opts}</select>`;
}

function lunesDe(fecha){
  const d = new Date(fecha);
  const dia = d.getDay();
  const diff = (dia === 0 ? -6 : 1 - dia);
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function fmtFecha(d){ return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}); }
function fechaKey(d){ return d.toISOString().slice(0,10); }
function fmtMoney(n){ return '$' + Number(n||0).toLocaleString('es-AR'); }

let semanaActual = lunesDe(new Date());
const collapsedDias = {};

function cambiarSemana(delta){
  semanaActual = new Date(semanaActual.getTime() + delta*7*86400000);
  render();
}
function irHoy(){ semanaActual = lunesDe(new Date()); render(); }

function render(){
  const weekKey = fechaKey(semanaActual);
  const pagosAll = cargarPagos();
  const pagosSemana = pagosAll[weekKey] || {};

  const fin = new Date(semanaActual.getTime() + 5*86400000);
  document.getElementById('weekrange').innerHTML =
    `Semana del ${fmtFecha(semanaActual)} al ${fmtFecha(fin)}<span>${semanaActual.getFullYear()}</span>`;

  let totalClases = 0, cobrado = 0, pendiente = 0;

  const html = DIAS.map(d => {
    const colapsado = !!collapsedDias[d.id];
    const filas = d.clases.map(cl => {
      totalClases++;
      const pagosCl = pagosSemana[cl.id] || {};
      const esGrupal = cl.alumnos.length > 1;
      const todosPagados = cl.alumnos.every((_, idx) => estaPagado(pagosCl, idx));
      const pagado = todosPagados;
      const precio = cl.p || 0;
      if (pagado) cobrado += precio; else pendiente += precio;
      const canchaClass = cl.c === 'C' ? 'C' : cl.c === 'D' ? 'D' : 'none';
      const canchaTxt = cl.c === 'C' ? 'C' : cl.c === 'D' ? 'D' : '?';

      const headNombre = esGrupal
        ? `<span class="grupal-lbl">Grupo (${cl.alumnos.length})</span>`
        : `<input class="texto solo" value="${cl.alumnos[0].replace(/"/g,'&quot;')}" onchange="setAlumno('${cl.id}',0,this.value)">${botonWA(cl.alumnos[0])}`;

      const checkHead = esGrupal
        ? `<div class="chk general ${todosPagados?'on':''}" title="Tildar/destildar a todos" onclick="toggleGeneral('${weekKey}','${cl.id}')">${todosPagados?'✓':''}</div>`
        : `${selectMetodo(weekKey, cl.id, 0, metodoDe(pagosCl,0))}<div class="chk ${pagado?'on':''}" onclick="togglePago('${weekKey}','${cl.id}',0)">${pagado?'✓':''}</div>`;

      const filasAlumnos = esGrupal ? cl.alumnos.map((nombre, idx) => {
        const p = estaPagado(pagosCl, idx);
        return `
          <div class="row alumno">
            <input class="texto" value="${nombre.replace(/"/g,'&quot;')}" onchange="setAlumno('${cl.id}',${idx},this.value)">
            ${botonWA(nombre)}
            ${selectMetodo(weekKey, cl.id, idx, metodoDe(pagosCl,idx))}
            <div class="chk ${p?'on':''}" onclick="togglePago('${weekKey}','${cl.id}',${idx})">${p?'✓':''}</div>
            <button class="btn-del" title="Quitar alumno" onclick="eliminarAlumno('${cl.id}',${idx})">×</button>
          </div>`;
      }).join('') : '';

      return `
        <div class="slot ${pagado?'paid':''}">
          <div class="row head ${esGrupal?'grupal':''}">
            <div class="hora">${cl.h}</div>
            ${headNombre}
            ${cl.nota ? `<span class="nota">${cl.nota}</span>` : ''}
            <div class="cancha-badge ${canchaClass}" onclick="toggleCancha('${cl.id}')" title="Tocar para cambiar cancha">${canchaTxt}</div>
            <input class="precio" type="number" placeholder="$" value="${cl.p||''}" onchange="setPrecio('${cl.id}', this.value)">
            ${checkHead}
            <button class="btn-del" title="Eliminar clase" onclick="eliminarClase('${cl.id}')">🗑</button>
          </div>
          ${filasAlumnos}
          <div class="row add-alumno-row">
            <input class="texto" id="add-alumno-${cl.id}" list="dl-contactos" placeholder="+ agregar alumno a esta clase">
            <button class="btn-del" style="color:var(--acc);font-size:18px" title="Agregar" onclick="agregarAlumno('${cl.id}')">+</button>
          </div>
        </div>`;
    }).join('');
    const totalDia = d.clases.reduce((s,cl)=> {
      const pagosCl = pagosSemana[cl.id] || {};
      const todos = cl.alumnos.every((_, idx) => estaPagado(pagosCl, idx));
      return s + (todos ? (cl.p||0) : 0);
    }, 0);
    return `
      <div class="day" style="--dc:${DIA_COLOR[d.id]}">
        <div class="day-h" onclick="toggleDia('${d.id}')">
          <h2>${d.nombre}</h2>
          <div class="day-tot">${d.clases.length} clases · ${fmtMoney(totalDia)} cobrado</div>
        </div>
        <div class="day-body ${colapsado?'collapsed':''}" id="body-${d.id}">
          ${filas}
          <div class="add-clase-row">
            <div class="addrow">
              <input class="add-hora" id="add-hora-${d.id}" placeholder="hh:mm">
              <input class="add-nombre" id="add-nombre-${d.id}" list="dl-contactos" placeholder="Alumno(s), ej: Juan y Pedro">
              <select class="add-cancha" id="add-cancha-${d.id}"><option value="">?</option><option value="C">C</option><option value="D">D</option></select>
              <input class="add-precio" id="add-precio-${d.id}" type="number" placeholder="$">
              <button onclick="agregarClase('${d.id}')">+ Agregar clase</button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('dias').innerHTML = html + datalistContactos();
  document.getElementById('s-total').textContent = totalClases;
  document.getElementById('s-cobrado').textContent = fmtMoney(cobrado);
  document.getElementById('s-pendiente').textContent = fmtMoney(pendiente);
}

function toggleDia(id){ collapsedDias[id] = !collapsedDias[id]; render(); }

function setAlumno(id, idx, val){
  DIAS.forEach(d => d.clases.forEach(cl => { if (cl.id===id) cl.alumnos[idx] = val; }));
  guardarTemplate();
}
function setPrecio(id, val){
  DIAS.forEach(d => d.clases.forEach(cl => { if (cl.id===id) cl.p = parseFloat(val)||0; }));
  guardarTemplate();
  render();
}
function toggleCancha(id){
  DIAS.forEach(d => d.clases.forEach(cl => {
    if (cl.id===id) cl.c = cl.c === 'C' ? 'D' : cl.c === 'D' ? '' : 'C';
  }));
  guardarTemplate();
  render();
}
function togglePago(weekKey, id, idx){
  const pagosAll = cargarPagos();
  if (!pagosAll[weekKey]) pagosAll[weekKey] = {};
  if (!pagosAll[weekKey][id]) pagosAll[weekKey][id] = {};
  if (!pagosAll[weekKey][id][idx]) pagosAll[weekKey][id][idx] = { p:false, m:'' };
  pagosAll[weekKey][id][idx].p = !pagosAll[weekKey][id][idx].p;
  guardarPagos(pagosAll);
  render();
}
function setMetodo(weekKey, id, idx, metodo){
  const pagosAll = cargarPagos();
  if (!pagosAll[weekKey]) pagosAll[weekKey] = {};
  if (!pagosAll[weekKey][id]) pagosAll[weekKey][id] = {};
  if (!pagosAll[weekKey][id][idx]) pagosAll[weekKey][id][idx] = { p:false, m:'' };
  pagosAll[weekKey][id][idx].m = metodo;
  guardarPagos(pagosAll);
}
function toggleGeneral(weekKey, id){
  const cl = DIAS.flatMap(d=>d.clases).find(c=>c.id===id);
  const pagosAll = cargarPagos();
  if (!pagosAll[weekKey]) pagosAll[weekKey] = {};
  const pagosCl = pagosAll[weekKey][id] || {};
  const todosPagados = cl.alumnos.every((_, idx) => estaPagado(pagosCl, idx));
  const nuevoEstado = !todosPagados;
  const nuevo = {};
  cl.alumnos.forEach((_, idx) => {
    const actual = pagosCl[idx] || { p:false, m:'' };
    nuevo[idx] = { p: nuevoEstado, m: actual.m };
  });
  pagosAll[weekKey][id] = nuevo;
  guardarPagos(pagosAll);
  render();
}

function agregarClase(dayId){
  const d = DIAS.find(x => x.id === dayId);
  const horaEl = document.getElementById('add-hora-'+dayId);
  const nombreEl = document.getElementById('add-nombre-'+dayId);
  const canchaEl = document.getElementById('add-cancha-'+dayId);
  const precioEl = document.getElementById('add-precio-'+dayId);
  const horaVal = horaEl.value.trim();
  const nombreVal = nombreEl.value.trim();
  if (!horaVal || !nombreVal) { alert('Completá la hora y el/los alumno(s)'); return; }
  const nuevaClase = {
    id: nuevoIdClase(dayId),
    h: normalizarHora(horaVal),
    alumnos: parseAlumnos(nombreVal),
    c: canchaEl.value,
    p: parseFloat(precioEl.value) || 0,
  };
  d.clases.push(nuevaClase);
  d.clases.sort((a,b) => a.h.localeCompare(b.h));
  guardarTemplate();
  render();
}
function eliminarClase(id){
  const d = DIAS.find(dd => dd.clases.some(c => c.id === id));
  if (!d) return;
  if (!confirm('¿Eliminar esta clase?')) return;
  d.clases = d.clases.filter(c => c.id !== id);
  const pagosAll = cargarPagos();
  Object.keys(pagosAll).forEach(wk => { delete pagosAll[wk][id]; });
  guardarPagos(pagosAll);
  guardarTemplate();
  render();
}
function agregarAlumno(id){
  const input = document.getElementById('add-alumno-'+id);
  const texto = input.value.trim();
  if (!texto) return;
  const cl = DIAS.flatMap(d => d.clases).find(c => c.id === id);
  cl.alumnos.push(...parseAlumnos(texto));
  guardarTemplate();
  render();
}
function eliminarAlumno(id, idx){
  const cl = DIAS.flatMap(d => d.clases).find(c => c.id === id);
  if (cl.alumnos.length <= 1) { alert('Para sacar el único alumno, eliminá la clase entera.'); return; }
  cl.alumnos.splice(idx, 1);
  const pagosAll = cargarPagos();
  Object.keys(pagosAll).forEach(wk => {
    const pagosCl = pagosAll[wk][id];
    if (!pagosCl) return;
    const nuevo = {};
    Object.keys(pagosCl).map(Number).sort((a,b)=>a-b).forEach(oldIdx => {
      if (oldIdx === idx) return;
      const newIdx = oldIdx < idx ? oldIdx : oldIdx - 1;
      nuevo[newIdx] = pagosCl[oldIdx];
    });
    pagosAll[wk][id] = nuevo;
  });
  guardarPagos(pagosAll);
  guardarTemplate();
  render();
}

function generarDatosBackup(){
  const data = {
    version: 1,
    fecha: new Date().toISOString(),
    template: JSON.parse(localStorage.getItem(LS_TEMPLATE) || '{}'),
    pagos: JSON.parse(localStorage.getItem(LS_PAGOS) || '{}'),
  };
  return {
    contenido: JSON.stringify(data, null, 2),
    nombre: 'horario-padel-backup-' + new Date().toISOString().slice(0,10) + '.json',
  };
}
// ── Backup a Google Drive (mismo mecanismo OAuth que la app principal) ────
const DRIVE_CLIENT_ID = '228796545161-onuqd5m0l2m92ove62b4u5dhse3n5uvh.apps.googleusercontent.com';
let _driveTokenClient = null;
let _driveToken       = null;
let _driveTokenExp    = 0;

function _loadGIS(){
  return new Promise(res => {
    if (window.google?.accounts?.oauth2) return res();
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = res; s.onerror = () => res();
    document.head.appendChild(s);
  });
}
function _fetchConTimeout(url, opts, ms = 20000){
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal }).finally(() => clearTimeout(id));
}
async function _getDriveToken(forceNew = false){
  if (!forceNew && _driveToken && Date.now() < _driveTokenExp - 60000) return _driveToken;
  await _loadGIS();
  if (!window.google?.accounts?.oauth2) throw new Error('No se pudo cargar Google Sign-In');
  return new Promise((resolve, reject) => {
    const tid = setTimeout(() => reject(new Error('Tiempo de espera agotado')), 120000);
    const cb = (resp) => {
      clearTimeout(tid);
      if (resp.error) { _driveToken = null; _driveTokenExp = 0; reject(new Error(resp.error_description || resp.error)); return; }
      _driveToken    = resp.access_token;
      _driveTokenExp = Date.now() + (resp.expires_in || 3600) * 1000;
      resolve(_driveToken);
    };
    if (!_driveTokenClient){
      _driveTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: DRIVE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.metadata.readonly',
        callback: cb
      });
    } else {
      _driveTokenClient.callback = cb;
    }
    _driveTokenClient.requestAccessToken({ prompt: forceNew ? 'consent' : 'select_account' });
  });
}
const CARPETA_BACKUP_NOMBRE = 'backup horarios y pagos';
let _carpetaBackupId = null;
async function _getCarpetaBackupId(token){
  if (_carpetaBackupId) return _carpetaBackupId;
  const cacheada = localStorage.getItem('drive_carpeta_backup_id');
  if (cacheada) { _carpetaBackupId = cacheada; return _carpetaBackupId; }
  const q = encodeURIComponent(`name = '${CARPETA_BACKUP_NOMBRE}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false`);
  try {
    const r = await _fetchConTimeout(
      `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=1`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (r.ok){
      const carpeta = (await r.json()).files?.[0];
      if (carpeta){
        _carpetaBackupId = carpeta.id;
        localStorage.setItem('drive_carpeta_backup_id', carpeta.id);
        return _carpetaBackupId;
      }
    }
  } catch(e) { console.warn('Buscar carpeta Drive:', e.message); }
  return null;
}

async function subirBackupDrive(){
  const btn = document.getElementById('btn-drive');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Conectando...'; }
  try {
    let token = await _getDriveToken();
    const { nombre, contenido } = generarDatosBackup();
    const carpetaId = await _getCarpetaBackupId(token);
    if (btn) btn.textContent = '⏳ Subiendo...';

    let existingId = null;
    const enCarpeta = carpetaId ? ` and '${carpetaId}' in parents` : '';
    const q = encodeURIComponent(`name contains 'horario-padel-backup' and trashed=false${enCarpeta}`);
    try {
      const sr = await _fetchConTimeout(
        `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=1`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      if (sr.status === 401 || sr.status === 403){
        _driveToken = null; _driveTokenExp = 0;
        token = await _getDriveToken(true);
        const sr2 = await _fetchConTimeout(
          `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=1`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        if (sr2.ok) existingId = (await sr2.json()).files?.[0]?.id || null;
      } else if (sr.ok){
        existingId = (await sr.json()).files?.[0]?.id || null;
      }
    } catch(searchErr) {
      console.warn('Drive search:', searchErr.message);
    }

    const boundary  = 'pdl' + Date.now();
    const metaObj    = { name: nombre, mimeType: 'application/json' };
    if (!existingId && carpetaId) metaObj.parents = [carpetaId];
    const meta     = JSON.stringify(metaObj);
    const body     = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${contenido}\r\n--${boundary}--`;

    const uploadUrl = existingId
      ? `https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;

    const res = await _fetchConTimeout(uploadUrl, {
      method: existingId ? 'PATCH' : 'POST',
      headers: {
        Authorization: `Bearer ${token}`,
        'Content-Type': `multipart/related; boundary="${boundary}"`
      },
      body
    }, 30000);

    if (!res.ok){
      const err = await res.json().catch(() => ({}));
      if (res.status === 401 || res.status === 403){
        _driveToken = null; _driveTokenExp = 0;
        throw new Error('Permiso denegado. Intentá de nuevo para reconectar.');
      }
      throw new Error(err?.error?.message || `Error ${res.status}`);
    }
    alert(carpetaId ? `✅ Backup guardado en la carpeta "${CARPETA_BACKUP_NOMBRE}"` : '✅ Backup subido a Google Drive (no encontré la carpeta "'+CARPETA_BACKUP_NOMBRE+'", quedó en la raíz)');
  } catch(e){
    const cancelErrors = ['popup_closed_by_user','access_denied','user_cancel','immediate_failed'];
    if (cancelErrors.includes(e.message)) {
      alert('⚠️ Autenticación con Google cancelada');
    } else {
      console.error('Drive backup error:', e);
      alert('❌ Error subiendo a Drive: ' + e.message);
    }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '☁️ Subir a Google Drive'; }
  }
}

function aplicarBackup(data){
  if (!data || typeof data.template !== 'object' || typeof data.pagos !== 'object') {
    alert('El archivo no tiene el formato esperado de backup.');
    return false;
  }
  if (!confirm('Esto va a reemplazar las clases, alumnos y pagos actuales por los del backup (' + (data.fecha || 'sin fecha') + '). ¿Continuar?')) return false;
  localStorage.setItem(LS_TEMPLATE, JSON.stringify(data.template));
  localStorage.setItem(LS_PAGOS, JSON.stringify(data.pagos));
  cargarTemplate();
  render();
  alert('Backup importado correctamente.');
  return true;
}
async function _buscarArchivoDrive(token, nombreContiene, carpetaId){
  async function buscar(soloEnCarpeta){
    const enCarpeta = (soloEnCarpeta && carpetaId) ? ` and '${carpetaId}' in parents` : '';
    const q = encodeURIComponent(`name contains '${nombreContiene}' and trashed=false${enCarpeta}`);
    let r = await _fetchConTimeout(
      `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc&pageSize=1`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (r.status === 401 || r.status === 403){
      _driveToken = null; _driveTokenExp = 0;
      token = await _getDriveToken(true);
      r = await _fetchConTimeout(
        `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc&pageSize=1`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
    }
    if (!r.ok) throw new Error(`Error ${r.status} buscando en Drive`);
    return { archivo: (await r.json()).files?.[0] || null, token };
  }
  let { archivo, token: tok } = await buscar(true);
  if (!archivo && carpetaId) ({ archivo, token: tok } = await buscar(false));
  return { archivo, token: tok };
}

async function importarBackupDrive(){
  const btn = document.getElementById('btn-drive-import');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Buscando...'; }
  try {
    let token = await _getDriveToken();
    const carpetaId = await _getCarpetaBackupId(token);
    const res = await _buscarArchivoDrive(token, 'horario-padel-backup', carpetaId);
    const archivo = res.archivo; token = res.token;
    if (!archivo) { alert('No encontré ningún backup en tu Google Drive todavía.'); return; }

    if (btn) btn.textContent = '⏳ Descargando...';
    const dr = await _fetchConTimeout(
      `https://www.googleapis.com/drive/v3/files/${archivo.id}?alt=media`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!dr.ok) throw new Error(`Error ${dr.status} descargando el archivo`);
    const data = await dr.json();
    aplicarBackup(data);
  } catch(e){
    console.error('Drive import error:', e);
    alert('❌ Error importando desde Drive: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '⬇️ Importar desde Google Drive'; }
  }
}

function verificarContactosAmbiguos(){
  const contactos = cargarContactos();
  if (!contactos.length) { alert('Primero traé los contactos con el botón "📇 Traer contactos"'); return; }

  // Detectar primeros-nombres duplicados entre contactos (causa de asociación ambigua)
  const porPrimerNombre = {};
  contactos.forEach(c => {
    const k = normalizarNombre(c.nombre);
    if (!k) return;
    if (!porPrimerNombre[k]) porPrimerNombre[k] = [];
    porPrimerNombre[k].push(c);
  });
  const ambiguos = Object.entries(porPrimerNombre).filter(([_,cs]) => cs.length > 1);

  // Detectar teléfonos duplicados entre distintos contactos
  const porTel = {};
  contactos.forEach(c => {
    const t = normalizarTelAR(c.tel||'');
    if (!t) return;
    if (!porTel[t]) porTel[t] = [];
    porTel[t].push(c);
  });
  const telDup = Object.entries(porTel).filter(([_,cs]) => cs.length > 1);

  if (!ambiguos.length && !telDup.length) {
    alert('✅ No se encontraron contactos ambiguos ni teléfonos duplicados.');
    return;
  }

  let msg = '';
  if (ambiguos.length) {
    msg += '⚠️ Nombres que empiezan igual (pueden confundirse al buscar por primera palabra):\n\n';
    ambiguos.forEach(([nombre, cs]) => {
      msg += '"' + nombre + '": ' + cs.map(c=>c.nombre+' ('+c.tel+')').join(' / ') + '\n';
    });
    msg += '\n';
  }
  if (telDup.length) {
    msg += '📱 Contactos con el mismo teléfono:\n\n';
    telDup.forEach(([tel, cs]) => {
      msg += tel + ': ' + cs.map(c=>c.nombre).join(' / ') + '\n';
    });
  }
  alert(msg);
}

async function importarContactosDrive(){
  const btn = document.getElementById('btn-contactos');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Buscando...'; }
  try {
    let token = await _getDriveToken();
    const carpetaId = await _getCarpetaBackupId(token);
    const res = await _buscarArchivoDrive(token, 'PadelConEmmanuel_backup', carpetaId);
    const archivo = res.archivo; token = res.token;
    if (!archivo) { alert('No encontré ningún backup de la app principal (PadelConEmmanuel_backup) en tu Google Drive.'); return; }

    if (btn) btn.textContent = '⏳ Descargando...';
    const dr = await _fetchConTimeout(
      `https://www.googleapis.com/drive/v3/files/${archivo.id}?alt=media`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!dr.ok) throw new Error(`Error ${dr.status} descargando el archivo`);
    const data = await dr.json();
    const alumnos = Array.isArray(data.alumnos) ? data.alumnos : [];
    const contactos = alumnos.filter(a => a.nombre && a.tel).map(a => ({ nombre: a.nombre, tel: a.tel }));
    localStorage.setItem(LS_CONTACTOS, JSON.stringify(contactos));
    render();
    alert(`✅ ${contactos.length} contactos con teléfono actualizados.`);
  } catch(e){
    console.error('Drive contactos error:', e);
    alert('❌ Error trayendo contactos: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📇 Traer contactos'; }
  }
}
